name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test tests/e2e/e2e-login.spec.ts --config=e2e.config.ts
      - name: Import results to AgileTest
        if: always()
        env:
          AGILETEST_TOKEN: ${{ secrets.JIRA_API_TOKEN }} # your API token from AgileTest
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }} # e.g. https://yourcompany.atlassian.net
          PROJECT_KEY: ${{ secrets.PROJECT_KEY }} # e.g. MYPROJ
        run: |
          curl -X POST \
          "${JIRA_BASE_URL}/ds/test-executions/junit?projectKey=${PROJECT_KEY}" \
          -H "Content-Type: application/xml" \
          -H "Authorization: Bearer ${AGILETEST_TOKEN}" \
          --data-binary "@test-results/junit.xml"
